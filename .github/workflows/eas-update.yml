name: OTA update (EAS Update)

# Every push to master publishes the JS over the air. Installed builds on
# the "production" channel pick it up next time the app is opened.

on:
  push:
    branches: [master]
    paths-ignore:
      - "landing/**"
      - "**.md"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: npm ci

      - name: Publish update
        run: eas update --channel production --message "$(git log -1 --pretty=%s)" --non-interactive
