# Manual helper: prints the latest EAS build statuses into the job log
# so build failures can be diagnosed without logging into expo.dev.
name: EAS status

on:
  workflow_dispatch:

jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - run: npm ci
      - name: List recent iOS builds
        run: |
          eas build:list --platform ios --limit 3 --non-interactive --json
