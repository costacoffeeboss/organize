name: Build iOS (TestFlight)

# Kicks off a cloud build on EAS servers. Only needed when native bits
# change (new SDK, new native module, app icon/config) — day-to-day JS
# changes ship via the OTA update workflow instead.
#
# Requires iOS credentials to already exist on EAS (created once by
# running `npx eas-cli build -p ios` interactively from a local terminal).

on:
  workflow_dispatch:
    inputs:
      submit:
        description: "Auto-submit to TestFlight when the build finishes"
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: npm ci

      - name: Start EAS build
        run: |
          if [ "${{ inputs.submit }}" = "true" ]; then
            eas build --platform ios --profile production --non-interactive --no-wait --auto-submit
          else
            eas build --platform ios --profile production --non-interactive --no-wait
          fi
